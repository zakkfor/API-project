# Netlify deployment configuration for the React frontend.
# The FastAPI backend must be deployed separately (e.g. on Railway or Render)
# and its public URL must be set as the VITE_API_URL environment variable
# in Netlify → Site configuration → Environment variables.
#
# Example:  VITE_API_URL = https://your-backend.up.railway.app

[build]
  base    = "frontend"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY      = "true"

# SPA fallback — all routes serve index.html so React Router works correctly
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
