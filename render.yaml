# Render deployment configuration
# https://docs.render.com/blueprint-spec

services:
  - type: web
    name: bike-house
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./app.db
    disk:
      name: bike-data
      mountPath: /app
      sizeGB: 1
