services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - bike-data:/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-this-to-a-random-secret-key}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////data/app.db}
      - SEED_USER_PASSWORD=${SEED_USER_PASSWORD:-BikeHouse2025!}
    restart: unless-stopped

volumes:
  bike-data:
